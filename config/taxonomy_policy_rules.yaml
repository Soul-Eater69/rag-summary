# ============================================================================
# Taxonomy Policy Rules (Phase 4)
#
# Per-stream rules that govern *label eligibility* — independent of evidence
# strength. These rules are evaluated by taxonomy/policy_reranker.py between
# verify_candidates (Pass 1) and finalize_selection (Pass 2).
#
# Terminology:
#   requires_any          - text signals needed to justify this stream label
#   weak_only_not_enough  - signals that alone are insufficient (trigger warning)
#   suppress_if_only_semantic - suppress if only semantic similarity (no direct signal)
#   prefer_over           - when this stream fires, demote these sibling streams
#   minimum_support_type  - "direct" | "pattern" | "any" (minimum bar for inclusion)
#   eligibility_boost     - score adjustment applied when rule fires (+/-)
#   family                - taxonomy family (informational / used for sibling lookups)
#
# Score semantics:
#   eligibility_boost > 0  → stream is a better fit than raw evidence suggests
#   eligibility_boost < 0  → stream is a weaker fit (penalty)
#   eligibility_boost = 0  → no adjustment
# ============================================================================


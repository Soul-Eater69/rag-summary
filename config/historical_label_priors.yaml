# ============================================================================
# Historical Label Priors (Phase 4)
#
# Per-family priors derived from observed labeling patterns across historical
# analog tickets. Used by taxonomy/policy_reranker.py to:
#   1. Boost candidates whose family shows strong historical labeling frequency
#   2. Flag candidates whose family is adjacent but rarely dominant
#   3. Identify downstream labels that are commonly co-labeled with a primary
#
# Schema per family:
#   dominant_labels    - streams that are primary (high prior) for this family
#   adjacent_weak_labels - streams that are often adjacent but rarely dominant
#   downstream_labels  - streams commonly co-labeled with a dominant label
#   label_frequency    - relative labeling frequency (0.0-1.0, informational)
# ============================================================================


# Canonical function vocabulary for the function normalizer (V5 architecture).
#
# This file is the authoritative source for the controlled vocabulary.
# The function_normalizer.py module uses this vocabulary plus phrase rules
# to map raw LLM-extracted function phrases to canonical terms.
#
# To add a new canonical function:
#   1. Add it to the vocab list below
#   2. Add matching rules in function_normalizer.py _PHRASE_RULES

version: "1"

vocab:
  - product setup
  - outreach
  - reporting
  - vendor integration
  - billing
  - payment
  - onboarding
  - portal access
  - request handling
  - quote/rating
  - care workflow
  - compliance
  - analytics
  - eligibility
  - claims processing
  - enrollment
  - authorization
  - grievance/appeals
  - pharmacy
  - risk adjustment
  - credentialing
  - network management
  - data migration
  - system integration

# Phrase rules: list of {triggers: [...], canonical: "..."} entries
# If ALL trigger tokens appear in a raw phrase (case-insensitive),
# the phrase maps to the canonical function.
#
# Note: These rules are currently implemented in function_normalizer.py.
# This YAML is the reference spec; function_normalizer.py is the runtime impl.
phrase_rules:
  - triggers: [product, setup]
    canonical: product setup
  - triggers: [product, launch]
    canonical: product setup
  - triggers: [commerciali]
    canonical: product setup
  - triggers: [outreach]
    canonical: outreach
  - triggers: [campaign]
    canonical: outreach
  - triggers: [communication, member]
    canonical: outreach
  - triggers: [report]
    canonical: reporting
  - triggers: [dashboard]
    canonical: reporting
  - triggers: [analytics]
    canonical: analytics
  - triggers: [insight]
    canonical: analytics
  - triggers: [vendor, integr]

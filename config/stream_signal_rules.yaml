# ============================================================================
# Stream Signal Rules (Phase 2)
#
# Per-family rules that strengthen or weaken evidence for value stream
# candidate scoring. Consumed by generation/card_candidates.py signal-aware
# scoring logic and (Phase 3) downstream_promoter.py.
#
# Schema per family:
#   positive_signals:          terms that strongly evidence the family
#   weak_only_not_enough:      terms that alone cannot produce a hit
#   attachment_boost_signals:  terms found in attachments that boost score
#   historical_promotion_hints: analog-history patterns that promote family
#   min_positive_required:     minimum positive_signals matches to score
#   score_boost:               additive boost when positive_signals match (0-1)
#   score_penalty:             penalty when only weak terms match (0-1)
# ============================================================================

version: "1"

families:

  # --------------------------------------------------------------------------
  # product_and_pricing — CPQ family
  # Under-recovered: ambiguous "pricing" and "quote" tokens bleed into
  # billing_order_to_cash; need stronger disambiguation rules.
  # --------------------------------------------------------------------------
  product_and_pricing:
    positive_signals:
      - "configure price"
      - "configure, price"
      - "cpq"
      - "quoting engine"
      - "rate card"
      - "product configuration"
      - "pricing rules"
      - "pricing engine"
      - "quote generation"
      - "rating engine"
      - "product catalog"
      - "plan configuration"
      - "benefit configuration"
      - "product setup"
      - "price book"
      - "underwriting rules"
    weak_only_not_enough:
      - "quote"        # alone is too generic — also lives in sales/claims
      - "pricing"      # generic — also appears in financial/actuarial context
      - "price"        # generic
      - "rate"         # generic
    attachment_boost_signals:
      - "cpq workflow"
      - "quoting workflow"
      - "rate card template"
      - "pricing spreadsheet"
      - "product matrix"
      - "configuration guide"
      - "product build"
      - "benefit build"
    historical_promotion_hints:
      - "Configure, Price, and Quote"
      - "CPQ"
      - "Manage Product and Service Inventory"
    min_positive_required: 1
    score_boost: 0.12
    score_penalty: 0.08


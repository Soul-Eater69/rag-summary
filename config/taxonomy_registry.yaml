# ============================================================================
# Canonical Taxonomy Registry (V1)
#
# Single source of truth for all value stream identities, aliases, family
# groupings, overlap rules, and preference/suppression policies.
#
# Used by:
#   - taxonomy/registry_loader.py  → loads into TaxonomyRegistry
#   - models/taxonomy.py           → TaxonomyStream / TaxonomyRegistry
#   - (Phase 4) taxonomy/policy_reranker.py  → rerank/suppress candidates
#
# Schema per stream:
#   id:                  stable integer ID
#   canonical_name:      official name used in final output
#   evaluation_name:     name used in eval GT comparison (often = canonical_name)
#   aliases:             list of known alternative spellings / abbreviations
#   family:              grouping label (e.g. "finance", "care_management")
#   scope:               free-text scope description
#   broad:               true if this stream is a broad umbrella concept
#   overlaps_with:       list of stream canonical_names that semantically overlap
#   preferred_over:      list of stream canonical_names this stream dominates
#   suppress_if_preferred: if true, suppress this stream when a preferred sibling is present
# ============================================================================

